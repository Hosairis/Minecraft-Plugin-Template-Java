# Add shared library versions here if needed, e.g.:
[versions]
shadow = "9.3.1"                   # Shadow plugin version
lombok = "1.18.42"                 # Lombok plugin version
paper = "1.21.11-R0.1-SNAPSHOT"    # Paper server software version
bukkit-factory = "1.3.1"           # resource-factory plugin version
run-paper = "3.0.2"                # run-task plugin version
bstats = "3.1.0"                   # bstats dependency version

# Add shared libraries here if needed, e.g.:
[libraries]
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
paper = { module = "io.papermc.paper:paper-api", version.ref = "paper" }
bstats = { module = "org.bstats:bstats-bukkit", version.ref = "bstats" }

# Add shared plugins here if needed, e.g.:
[plugins]                                 # Kotlin JVM plugin
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
bukkit-factory = { id = "xyz.jpenilla.resource-factory-bukkit-convention", version.ref = "bukkit-factory" }
run-paper = { id = "xyz.jpenilla.run-paper", version.ref = "run-paper" }
